---
- hosts: build_slave
  become: true 
  tasks: 
  - name: update ubuntu repo and cache 
    apt: 
      update_cache: yes 
      force_apt_get: yes 
      cache_valid_time: 3600 

  - name: install java 
    apt: 
      name: openjdk-21-jre
      state: present

  - name: download maven packages 
    get_url:
      url: https://dlcdn.apache.org/maven/maven-3/3.9.15/binaries/apache-maven-3.9.15-bin.tar.gz
      dest: /opt

  - name: extract maven packages 
    unarchive:
      src: /opt/apache-maven-3.9.15-bin.tar.gz
      dest: /opt 
      remote_src: yes

  - name: install docker 
    apt: 
      name: docker.io 
      state: present

  - name: start docker services 
    service: 
      name: docker 
      state: started 
  
  - name: give 777 permissions on /var/run/docker.sock
    file: 
      path: /var/run/docker.sock
      state: file 
      mode: 0777

  - name: start docker on boot time 
    service: 
      name: docker 
      enabled: yes 
      
  - name: remove awscli v1 if present
    apt:
      name: awscli
      state: absent

  - name: download aws cli v2
    get_url:
      url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
      dest: /tmp/awscliv2.zip

  - name: install unzip
    apt:
      name: unzip
      state: present

  - name: unzip aws cli
    unarchive:
      src: /tmp/awscliv2.zip
      dest: /tmp
      remote_src: yes

  - name: install aws cli
    command: ./aws/install
    args:
      chdir: /tmp
      creates: /usr/local/bin/aws